<div class="min-h-screen bg-gray-50 flex flex-col">
  <!-- Header -->
  <div class="bg-white shadow-sm border-b">
    <div class="w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 2xl:px-16">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <button
            (click)="navigate('/dashboard')"
            class="p-2 hover:bg-gray-100 rounded-lg transition-colors"
          >
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <div class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h1 class="text-xl font-bold text-gray-900">AI Finance Chat</h1>
        </div>
        <button
          (click)="navigate('/dashboard')"
          class="px-4 py-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"
        >
          Back to Dashboard
        </button>
      </div>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="flex-1 w-full px-3 py-6 sm:px-6 lg:px-8 xl:px-12 2xl:px-16 overflow-auto">
    <!-- Quick Questions - Show at top -->
    <div *ngIf="messages.length <= 1" class="mb-8 p-6 bg-gradient-to-r from-indigo-50 to-blue-50 rounded-xl border-2 border-indigo-100">
      <div class="text-center mb-4">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-full mb-3">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">Quick Questions to Get Started</h3>
        <p class="text-gray-600">Click any question below to start analyzing your finances:</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <button
          *ngFor="let question of quickQuestions"
          (click)="askQuickQuestion(question)"
          class="px-4 py-3 text-sm font-medium text-gray-800 bg-white border-2 border-gray-200 rounded-lg hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-all duration-200 shadow-sm text-left"
        >
          {{ question }}
        </button>
      </div>
    </div>
    
    <div class="w-full space-y-4 mb-6">
      <div
        *ngFor="let message of messages"
        class="flex" [ngClass]="{'justify-end': message.type === 'user', 'justify-start': message.type !== 'user'}"
      >
        <div
          class="max-w-xs sm:max-w-sm lg:max-w-md xl:max-w-lg px-4 py-3 rounded-2xl"
          [ngClass]="message.type === 'user' ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-white shadow-sm border rounded-bl-sm'"
        >
          <div *ngIf="message.type === 'bot'" class="flex items-center mb-2">
            <div class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mr-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <span class="text-sm font-medium text-gray-600">AI Assistant</span>
          </div>
          <p class="text-sm whitespace-pre-wrap" [ngClass]="message.type === 'user' ? 'text-white' : 'text-gray-800'">
            {{ message.content }}
          </p>
          <p class="text-xs mt-2" [ngClass]="message.type === 'user' ? 'text-indigo-200' : 'text-gray-500'">
            {{ message.timestamp | date:'shortTime' }}
          </p>
        </div>
      </div>
      
      <div *ngIf="isLoading" class="flex justify-start">
        <div class="bg-white shadow-sm border rounded-2xl rounded-bl-sm px-4 py-3 max-w-xs">
          <div class="flex items-center mb-2">
            <div class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mr-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <span class="text-sm font-medium text-gray-600">AI Assistant</span>
          </div>
          <div class="flex space-x-1">
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
          </div>
        </div>
      </div>
      <div #messagesEndRef></div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="bg-white border-t">
    <div class="w-full px-3 py-4 sm:px-6 lg:px-8 xl:px-12 2xl:px-16">
      <div class="w-full flex space-x-4">
        <div class="flex-1">
          <textarea
            [(ngModel)]="inputValue"
            (keypress)="handleKeyPress($event)"
            placeholder="Ask me about your spending, savings opportunities, or any financial questions..."
            class="w-full px-4 py-3 border border-gray-300 rounded-xl resize-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            rows="1"
            [disabled]="isLoading"
          ></textarea>
        </div>
        <button
          (click)="sendMessage()"
          [disabled]="!inputValue.trim() || isLoading"
          class="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
